name: Full CI/CD

on:
  push:
    branches:
      - main

jobs:

  deploy:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t company-site .

      - name: Run container
        run: docker run -d --name website -p 8080:80 company-site

      - name: Wait
        run: sleep 5

      - name: Test website
        run: curl http://localhost:8080

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push image
        run: |
          docker tag company-site katharsis267/company-site:latest
          docker push katharsis267/company-site:latest
