name: system-info

on:
  push

jobs:
  info:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Show OS
        run: uname -a

      - name: Show current user
        run: whoami

      - name: Show date
        run: date
    
      - name: Show disk usage
        run: df -h
