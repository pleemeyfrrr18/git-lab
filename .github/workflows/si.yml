name: Company CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:

  test:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t company-site .

      - name: Run container
        run: docker run -d --name website -p 8080:80 company-site

      - name: Wait
        run: sleep 5

      - name: Check website
        run: curl http://localhost:8080

      - name: Verify page
        run: |
          curl http://localhost:8080 | grep "Welcome"

      - name: Stop container
        run: docker stop website

      - name: Remove container
        run: docker rm website
